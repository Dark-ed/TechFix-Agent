<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TechFix Agent</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>TechFix AI</h1>
      <p>Autonomous Troubleshooting Agent</p>
    </header>
    <main id="chatBox" class="chat-box"></main>
    <form id="chatForm" class="chat-input">
      <input id="userInput" placeholder="Describe your issue..." autocomplete="off"/>
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
